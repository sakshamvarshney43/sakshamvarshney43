name: Update Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=sakshamvarshney43&show_icons=true&hide_border=false&border_color=1F2430&border_radius=14&bg_color=0B0E14&title_color=3B82F6&icon_color=8B95A5&text_color=E5E9F0&ring_color=3B82F6"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=sakshamvarshney43&layout=compact&hide_border=false&border_color=1F2430&border_radius=14&bg_color=0B0E14&title_color=3B82F6&text_color=E5E9F0&langs_count=8"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "chore: update stats cards" || exit 0
          git push
