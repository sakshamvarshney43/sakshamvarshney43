name: Update Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=sakshamvarshney43&show_icons=true&hide_border=false&border_color=0F766E&border_radius=10&bg_color=03100C&title_color=10B981&icon_color=A7F3D0&text_color=C9D1D9&ring_color=D4AF37&rank_icon=percentile"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=sakshamvarshney43&layout=compact&hide_border=false&border_color=0F766E&border_radius=10&bg_color=03100C&title_color=10B981&text_color=C9D1D9&langs_count=8"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "chore: update stats cards" || exit 0
          git push
