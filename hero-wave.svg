<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0D"/>
      <stop offset="100%" stop-color="#050506"/>
    </linearGradient>
    <radialGradient id="vignette" cx="30%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#141414" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bulbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE8B5" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#FFC66D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFC66D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotlight" cx="0" cy="0" r="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      <animate attributeName="cx" values="60;235;410;585;760" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="172;172;172;172;172" dur="5.5s" repeatCount="indefinite"/>
    </radialGradient>
    <mask id="revealMask">
      <rect width="1200" height="300" fill="#1a1a1a"/>
      <circle cx="60" cy="172" r="150" fill="url(#spotlight)">
        <animate attributeName="cx" values="60;235;410;585;760" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
      </circle>
    </mask>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <rect width="1200" height="300" fill="url(#vignette)"/>

  <text x="48" y="70" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" letter-spacing="4" fill="#6B7280">SOFTWARE ENGINEER · FULL-STACK · AI/ML</text>

  <text x="48" y="190" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#3A3A3E">Saksham Varshney</text>
  <text x="48" y="190" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" filter="url(#softGlow)" mask="url(#revealMask)">Saksham Varshney</text>

  <rect x="48" y="210" width="0" height="2" fill="#FFC66D" opacity="0.8">
    <animate attributeName="width" values="0;520" dur="5.5s" keyTimes="0;1" repeatCount="indefinite" calcMode="linear"/>
  </rect>

  <ellipse cy="180" rx="30" ry="6" fill="#000000">
    <animate attributeName="cx" values="60;235;410;585;760" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.15;0.55;0.15;0.55" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="22;38;22;38;22" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>

  <circle r="48" fill="url(#bulbGlow)">
    <animate attributeName="cx" values="60;235;410;585;760" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;70;150;70;150" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="#FFF6E0">
    <animate attributeName="cx" values="60;235;410;585;760" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;70;150;70;150" keyTimes="0;0.25;0.5;0.75;1" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <text x="48" y="246" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" font-size="14" fill="#9CA3AF" opacity="0">
    Building production systems · MNNIT Allahabad
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.7;1" dur="5.5s" repeatCount="indefinite"/>
  </text>
</svg>