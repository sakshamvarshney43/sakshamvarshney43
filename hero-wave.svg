<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cardClip"><rect width="1200" height="300"/></clipPath>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#05070C"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#FFFFFF" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <g clip-path="url(#cardClip)">
    <rect width="1200" height="300" fill="url(#dots)"/>
    <circle cx="920" cy="70" r="220" fill="url(#orb1)">
      <animate attributeName="cx" values="920;960;920" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="230" r="180" fill="url(#orb2)">
      <animate attributeName="cy" values="230;190;230" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="48" y="90" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" letter-spacing="3" fill="#A78BFA">SOFTWARE ENGINEER · FULL-STACK · AI/ML</text>
  <text x="48" y="152" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="50" font-weight="700" fill="#F8FAFC">Saksham Varshney</text>
  <text x="48" y="184" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" font-size="14" fill="#C4B5FD">Building production systems · MNNIT Allahabad</text>

  <g font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" font-size="12" font-weight="500">
    <rect x="48" y="216" width="68" height="27" rx="13" fill="#161320" stroke="#3B3550" stroke-width="1"/>
    <text x="82" y="234" text-anchor="middle" fill="#C4B5FD">React</text>
    <rect x="126" y="216" width="86" height="27" rx="13" fill="#161320" stroke="#3B3550" stroke-width="1"/>
    <text x="169" y="234" text-anchor="middle" fill="#C4B5FD">Node.js</text>
    <rect x="222" y="216" width="106" height="27" rx="13" fill="#161320" stroke="#3B3550" stroke-width="1"/>
    <text x="275" y="234" text-anchor="middle" fill="#C4B5FD">TypeScript</text>
    <rect x="338" y="216" width="76" height="27" rx="13" fill="#161320" stroke="#3B3550" stroke-width="1"/>
    <text x="376" y="234" text-anchor="middle" fill="#C4B5FD">AI / ML</text>
  </g>
</svg>